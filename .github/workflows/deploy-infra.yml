name: Deploy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"

      - name: Install Lambda dependencies
        run: |
          npm ci --prefix infra/lambdas/game
          npm ci --prefix infra/lambdas/upload

      - name: Build db-init Lambda
        working-directory: infra/lambdas/db-init
        run: npm install && npx esbuild index.mjs --bundle --platform=node --target=node20 --format=cjs --outfile=dist/index.js

      - name: Terraform init
        run: terraform init
        working-directory: infra

      - name: Terraform apply
        run: terraform apply -auto-approve
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_jwt_secret:  ${{ secrets.JWT_SECRET }}

      - name: Print outputs
        run: terraform output
        working-directory: infra
