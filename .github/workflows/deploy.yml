name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install & build client
        run: npm ci && npm run build
        working-directory: client

  build-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    outputs:
      instance_id: ${{ steps.tf-output.outputs.instance_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kfupm-geo-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/kfupm-geo-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ steps.ecr-login.outputs.registry }}/kfupm-geo-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0
          terraform_wrapper: false

      - name: Install Lambda dependencies
        run: |
          cd infra/lambdas/game && npm ci
          cd ../upload && npm ci

      - name: Terraform init & apply
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.TF_VAR_db_password }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}"
        working-directory: infra

      - name: Get instance ID
        id: tf-output
        run: echo "instance_id=$(terraform output -raw instance_id)" >> "$GITHUB_OUTPUT"
        working-directory: infra

  deploy:
    name: Deploy to EC2
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/kfupm-geo-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait for SSM agent to be online
        run: |
          INSTANCE_ID="${{ needs.build-push.outputs.instance_id }}"

          echo "Waiting for SSM agent on $INSTANCE_ID..."

          for i in $(seq 1 40); do
            STATUS=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || true)

            if [ "$STATUS" = "Online" ]; then
              echo "SSM agent is online."
              exit 0
            fi

            echo "Not ready yet ($i/40), current status: ${STATUS:-None}, retrying in 15s..."
            sleep 15
          done

          echo "SSM agent did not come online after 10 minutes."
          exit 1

      - name: Wait for user data app files
        run: |
          INSTANCE_ID="${{ needs.build-push.outputs.instance_id }}"

          echo "Waiting for /opt/app/docker-compose.yml to exist on $INSTANCE_ID..."

          for i in $(seq 1 60); do
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=["test -f /opt/app/docker-compose.yml"]' \
              --query "Command.CommandId" \
              --output text)

            if aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" 2>/dev/null; then
              echo "App files are ready."
              exit 0
            fi

            echo "App files not ready yet ($i/60), waiting 10s..."
            sleep 10
          done

          echo "Timed out waiting for /opt/app/docker-compose.yml"

          echo "Latest check command output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json || true

          echo "Cloud-init/user-data logs:"
          DEBUG_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "sudo tail -n 200 /var/log/cloud-init-output.log || true",
              "sudo tail -n 200 /var/log/user-data.log || true",
              "sudo ls -la /opt || true",
              "sudo systemctl status amazon-ssm-agent --no-pager || true",
              "sudo systemctl status docker --no-pager || true"
            ]' \
            --query "Command.CommandId" \
            --output text)

          aws ssm wait command-executed \
            --command-id "$DEBUG_COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "$DEBUG_COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json || true

          exit 1

      - name: Pull & restart containers via SSM
        run: |
          INSTANCE_ID="${{ needs.build-push.outputs.instance_id }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "set -euxo pipefail",
              "cd /opt/app",
              "ls -la",
              "systemctl is-active docker || sudo systemctl start docker",
              "docker info",
              "bash ecr-login.sh",
              "docker compose pull",
              "docker compose up -d --force-recreate",
              "docker ps"
            ]' \
            --query "Command.CommandId" \
            --output text)

          if ! aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"; then
            echo "SSM deploy command failed. Output:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
              --output json
            exit 1
          fi

          echo "SSM deploy command completed. Output:"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
